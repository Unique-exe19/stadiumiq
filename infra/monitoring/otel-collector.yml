receivers:
  - otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  - prometheus:
      config:
        scrape_configs:
          - job_name: 'stadiumiq-api'
            static_configs:
              - targets: ['api:9464']
          - job_name: 'stadiumiq-ai'
            static_configs:
              - targets: ['ai-service:8000']

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    limit_mib: 400
    spike_limit_mib: 100
  resource:
    attributes:
      - action: upsert
        key: service.namespace
        value: stadiumiq

exporters:
  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: stadiumiq
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
  telemetry:
    logs:
      level: warn
