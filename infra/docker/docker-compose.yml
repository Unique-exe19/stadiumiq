version: '3.9'

# =============================================================================
# StadiumIQ – Docker Compose (Development)
# =============================================================================

networks:
  stadiumiq-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: stadiumiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stadiumiq
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-dev_password_change_in_prod}
      POSTGRES_DB: stadiumiq_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - stadiumiq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stadiumiq -d stadiumiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: stadiumiq-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev_redis_password}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - stadiumiq-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-dev_redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant Vector Database
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: stadiumiq-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-dev_qdrant_key}
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - stadiumiq-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # NestJS API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
      target: development
    container_name: stadiumiq-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://stadiumiq:${DATABASE_PASSWORD:-dev_password_change_in_prod}@postgres:5432/stadiumiq_db
      REDIS_URL: redis://default:${REDIS_PASSWORD:-dev_redis_password}@redis:6379
      QDRANT_URL: http://qdrant:6333
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/src
      - ./packages:/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - stadiumiq-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # FastAPI AI Service
  # ---------------------------------------------------------------------------
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: ../../infra/docker/Dockerfile.ai
      target: development
    container_name: stadiumiq-ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql://stadiumiq:${DATABASE_PASSWORD:-dev_password_change_in_prod}@postgres:5432/stadiumiq_db
      REDIS_URL: redis://default:${REDIS_PASSWORD:-dev_redis_password}@redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ai-service/src:/app/src
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stadiumiq-network

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
      target: development
    container_name: stadiumiq-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    depends_on:
      - api
    networks:
      - stadiumiq-network

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: stadiumiq-otel
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    networks:
      - stadiumiq-network

  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: stadiumiq-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - stadiumiq-network

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: stadiumiq-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - stadiumiq-network
